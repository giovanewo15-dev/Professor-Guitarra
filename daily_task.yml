name: Daily Guitar Task

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Check if previous task was studied
        id: gate
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          data = json.loads(Path("data/tasks.json").read_text(encoding="utf-8"))
          status = data.get("current_task", {}).get("status")
          print(f"status={status}")
          allow = status == "studied"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"allow_generate={'true' if allow else 'false'}\n")
          PY

      - name: Generate next task
        if: ${{ steps.gate.outputs.allow_generate == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: python scripts/generate_task.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add data/tasks.json
          git commit -m "Daily task update"
          git push
